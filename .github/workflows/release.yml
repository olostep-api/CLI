name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build standalone binaries with PyInstaller (one per platform)
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin
            arch: arm64
            artifact: olostep-darwin-arm64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
            artifact: olostep-darwin-x64
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            artifact: olostep-linux-x64
          - runner: windows-latest
            platform: win32
            arch: x64
            artifact: olostep-win32-x64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e ".[build]"

      - name: Build binary with PyInstaller
        run: pyinstaller olostep.spec

      - name: Rename binary to platform-specific name
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            mv dist/olostep.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/olostep "dist/${{ matrix.artifact }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  # ---------------------------------------------------------------------------
  # 2. Create a GitHub Release and attach all binaries
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # 3. Publish the npm wrapper package
  # ---------------------------------------------------------------------------
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set npm package version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
